<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLienLand</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      color: #222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 32px;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-size: 1.8rem;
      color: #222;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 16px;
    }

    p {
      color: #555;
      font-size: 1rem;
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
    }

    .btn {
      padding: 12px 32px;
      background-color: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

  <header>
    <h1>MathLienLand</h1>
  </header>

  <main>
    <p>Aprende matemáticas jugando. Inicia sesión para empezar.</p>
    <a href="auth.html" class="btn">Iniciar sesión</a>
  </main>

</body>
</html>
