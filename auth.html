<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLienLand — Acceso</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-auth">

  <header>
    <h1>MathLienLand</h1>
  </header>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</div>
    </div>

    <!--Login form -->
    <form class="form active" id="form-login" onsubmit="login(event)">
      <div>
        <label>Email</label>
        <input type="email" id="login-email" required />
      </div>
      <div>
        <label>Contraseña</label>
        <input type="password" id="login-password" required />
      </div>
      <p class="mensaje" id="login-msg"></p>
      <button type="submit">Entrar</button>
    </form>

    <!--Register form-->
    <form class="form" id="form-register" onsubmit="register(event)">
      <div>
        <label>Nombre</label>
        <input type="text" id="register-name" required />
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="register-email" required />
      </div>
      <div>
        <label>Contraseña</label>
        <input type="password" id="register-password" required minlength="6" />
      </div>
      <p class="mensaje" id="register-msg"></p>
      <button type="submit">Crear cuenta</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    //Check session
    db.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'game.html';
    });

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }

    async function login(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = 'Email o contraseña incorrectos.';
        msg.className = 'mensaje error';
      } else {
        window.location.href = 'game.html';
      }
    }

    async function register(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const msg = document.getElementById('register-msg');

      const { data, error } = await db.auth.signUp({ email, password });

      if (error) {
        msg.textContent = error.message;
        msg.className = 'mensaje error';
        return;
      }

      //Save name in users table
      await db.from('users').insert({
        id: data.user.id,
        name: name,
        email: email
      });

      msg.textContent = 'Cuenta creada. Ya puedes iniciar sesión.';
      msg.className = 'mensaje ok';
      switchTab('login');
    }
  </script>

</body>
</html>
