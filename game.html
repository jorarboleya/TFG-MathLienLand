<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLienLand</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-game">

  <header>
    <div style="min-width:160px;"></div>
    <h1>MathLienLand</h1>
    <div id="user-info">
      <span id="user-name"></span>
      <a href="dashboard.html" id="btn-dashboard">My performance</a>
      <button id="btn-logout" onclick="logout()">Log out</button>
    </div>
  </header>

  <main>
    <div id="game-container">
      <div id="placeholder">
        <h2>Game not available</h2>
      </div>
      <iframe
        id="game-frame"
        src="game/index.html"
        allow="autoplay; fullscreen"
        allowfullscreen
        style="display:none;"
      ></iframe>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    //Check session
    db.auth.getSession().then(async ({ data }) => {
      if (!data.session) {
        window.location.href = 'auth.html';
        return;
      }

      const userId = data.session.user.id;
      const { data: usuario } = await db
        .from('users')
        .select('name')
        .eq('id', userId)
        .single();

      if (usuario) {
        document.getElementById('user-name').textContent = usuario.name;
      }
    });

    async function logout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    //Bridge between godot and supabase
    async function getCurrentUserId(){
      const {data} = await db.auth.getSession();
      return data.session?.user.id;
    }

    window.saveSession = async function(minigame, duration){
      const userId = await getCurrentUserId();
      if(!userId) return null;
      const{data, error}=await db
      .from('sessions')
      .insert({
        user_id: userId,
        minigame: minigame,
        duration: duration
      })
      .select('id')
      .single();
      if(error){
        console.error('Error saving session:', error);
        return null;
      }
      console.log('Session saved:', data.id);
      return data.id;
    };

    window.saveAnswer = async function (sessionId, questionId, correct, time, difficulty){
      const {error} = await db
      .from('answers')
      .insert({
        session_id: sessionId,
        question_id: questionId,
        correct: correct,
        time: time,
        difficulty: difficulty
      });
      if(error){
        console.error('Error saving answer:', error);
        return null;
      }
    };

    window.saveFullGame = async function(data){
      const sessionId = await window.saveSession(data.minigame, data.duration);
      if(!sessionId)return null;
      for(const answer of data.answers){
        await window.saveAnswer(
          sessionId,
          answer.question_id,
          answer.correct,
          answer.time,
          answer.difficulty
        );
      }
      console.log('Game saved:', data.minigame, 'answered:', data.answers.length);
    };


    //Load game
    const frame = document.getElementById('game-frame');
    const placeholder = document.getElementById('placeholder');

    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.trim() !== '') {
          placeholder.style.display = 'none';
          frame.style.display = 'block';
        }
      } catch (e) {
      }
    });

    frame.addEventListener('error', () => {
      placeholder.style.display = 'flex';
      frame.style.display = 'none';
    });
  </script>

</body>
</html>
