<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLienLand</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-game">

  <header>
    <div style="min-width:160px;"></div>
    <h1>MathLienLand</h1>
    <div id="user-info">
      <span id="user-name"></span>
      <a href="dashboard.html" id="btn-dashboard">My performance</a>
      <button id="btn-logout" onclick="logout()">Log out</button>
    </div>
  </header>

  <!-- Mode selector modal (shown only if student is in a group) -->
  <div id="mode-modal" style="display:none;">
    <div id="mode-modal-box">
      <h2>How do you want to play?</h2>
      <div id="mode-buttons"></div>
    </div>
  </div>

  <main>
    <div id="game-container">
      <div id="placeholder">
        <h2>Game not available</h2>
      </div>
      <iframe
        id="game-frame"
        src="game/index.html"
        allow="autoplay; fullscreen"
        allowfullscreen
        style="display:none;"
      ></iframe>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    window.activeGroupId = null;

    //check auth
    db.auth.getSession().then(async ({ data }) => {
      if (!data.session) {
        window.location.href = 'auth.html';
        return;
      }

      const userId = data.session.user.id;
      //exposed before the async profile fetch so Godot can read it via JavaScript.eval()
      window.currentUserId = userId;
      const { data: usuario } = await db
        .from('users')
        .select('name, role')
        .eq('id', userId)
        .single();

      if (!usuario) return;

      if (usuario.role === 'teacher') {
        window.location.href = 'teacher-dashboard.html';
        return;
      }

      document.getElementById('user-name').textContent = usuario.name;

      const { data: memberships } = await db
        .from('group_members')
        .select('group_id, groups(id, name)')
        .eq('student_id', userId);

      if (memberships && memberships.length > 0) {
        showModeModal(memberships.map(m => m.groups));
      }
    });

    function showModeModal(groups) {
      const modal = document.getElementById('mode-modal');
      const buttonsDiv = document.getElementById('mode-buttons');
      modal.style.display = 'flex';

      groups.forEach(group => {
        const btn = document.createElement('button');
        btn.textContent = `Play for group: ${group.name}`;
        btn.className = 'mode-btn mode-btn--group';
        btn.onclick = () => {
          window.activeGroupId = group.id;
          modal.style.display = 'none';
        };
        buttonsDiv.appendChild(btn);
      });

      const btnIndividual = document.createElement('button');
      btnIndividual.textContent = 'Play individually (private)';
      btnIndividual.className = 'mode-btn mode-btn--individual';
      btnIndividual.onclick = () => {
        window.activeGroupId = null;
        modal.style.display = 'none';
      };
      buttonsDiv.appendChild(btnIndividual);

      const btnDashboard = document.createElement('button');
      btnDashboard.textContent = 'Go to my dashboard';
      btnDashboard.className = 'mode-btn mode-btn--dashboard';
      btnDashboard.onclick = () => { window.location.href = 'dashboard.html'; };
      buttonsDiv.appendChild(btnDashboard);
    }

    async function logout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    //supabase bridge exposed for Godot
    async function getCurrentUserId() {
      const { data } = await db.auth.getSession();
      return data.session?.user.id;
    }

    window.saveSession = async function (minigame, duration) {
      const userId = await getCurrentUserId();
      if (!userId) return null;
      const sessionData = {
        user_id: userId,
        minigame,
        duration,
        ...(window.activeGroupId && { group_id: window.activeGroupId })
      };
      const { data, error } = await db
        .from('sessions')
        .insert(sessionData)
        .select('id')
        .single();
      if (error) {
        console.error('Error saving session:', error);
        return null;
      }
      return data.id;
    };

    window.saveAnswer = async function (sessionId, questionId, correct, time, difficulty) {
      const { error } = await db
        .from('answers')
        .insert({ session_id: sessionId, question_id: questionId, correct, time, difficulty });
      if (error) {
        console.error('Error saving answer:', error);
      }
    };

    window.saveFullGame = async function (data) {
      const sessionId = await window.saveSession(data.minigame, data.duration);
      if (!sessionId) return;
      for (const answer of data.answers) {
        await window.saveAnswer(
          sessionId,
          answer.question_id,
          answer.correct,
          answer.time,
          answer.difficulty
        );
      }
    };


    const frame = document.getElementById('game-frame');
    const placeholder = document.getElementById('placeholder');

    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.trim() !== '') {
          placeholder.style.display = 'none';
          frame.style.display = 'block';
        }
      } catch (e) {}
      //inject saveFullGame into the iframe so Godot can call it via JavaScript.eval
      try {
        frame.contentWindow.saveFullGame = (data) => window.saveFullGame(data);
      } catch (e) {
        console.error('Could not inject saveFullGame into iframe:', e);
      }
    });

    frame.addEventListener('error', () => {
      placeholder.style.display = 'flex';
      frame.style.display = 'none';
    });
  </script>

</body>
</html>
