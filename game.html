<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLienLand</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      color: #222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 32px;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.8rem;
      color: #222;
      letter-spacing: 1px;
      flex: 1;
      text-align: center;
    }

    #user-info {
      font-size: 0.85rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 160px;
      justify-content: flex-end;
    }

    #btn-logout {
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #555;
    }

    #btn-logout:hover {
      background-color: #f0f0f0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      width: 100%;
      max-width: 1200px;
    }

    #game-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background-color: #000;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    #game-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      gap: 12px;
      padding: 32px;
      text-align: center;
    }

    #placeholder h2 {
      font-size: 1.2rem;
      color: #ccc;
    }

    #placeholder p {
      color: #888;
      max-width: 480px;
      line-height: 1.6;
    }

    #placeholder code {
      background: #2a2a2a;
      color: #aaa;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <div style="min-width:160px;"></div>
    <h1>MathLienLand</h1>
    <div id="user-info">
      <span id="user-name"></span>
      <button id="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <div id="game-container">
      <div id="placeholder">
        <h2>Juego no disponible</h2>
        <p>
          Exporta el proyecto de Godot a HTML5 y copia los archivos
          en la carpeta <code>game/</code>.
        </p>
      </div>
      <iframe
        id="game-frame"
        src="game/index.html"
        allow="autoplay; fullscreen"
        allowfullscreen
        style="display:none;"
      ></iframe>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Comprobar sesión al cargar
    db.auth.getSession().then(async ({ data }) => {
      if (!data.session) {
        window.location.href = 'auth.html';
        return;
      }

      const userId = data.session.user.id;
      const { data: usuario } = await db
        .from('users')
        .select('name')
        .eq('id', userId)
        .single();

      if (usuario) {
        document.getElementById('user-name').textContent = usuario.name;
      }
    });

    async function logout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    // Cargar juego
    const frame = document.getElementById('game-frame');
    const placeholder = document.getElementById('placeholder');

    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.trim() !== '') {
          placeholder.style.display = 'none';
          frame.style.display = 'block';
        }
      } catch (e) {
        // cross-origin o 404, se queda el placeholder
      }
    });

    frame.addEventListener('error', () => {
      placeholder.style.display = 'flex';
      frame.style.display = 'none';
    });
  </script>

</body>
</html>
